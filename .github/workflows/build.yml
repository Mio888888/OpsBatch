name: Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version change
        id: check
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          TAG="v${VERSION}"
          if git tag -l "$TAG" | grep -q .; then
            echo "Tag ${TAG} already exists, skipping build"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} not found, will build"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    name: Build Windows
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare updater config
        shell: bash
        run: |
          set -euo pipefail
          test -n "${TAURI_UPDATER_PUBKEY}"
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
          sed -i.bak "s#__TAURI_UPDATER_PUBKEY__#${TAURI_UPDATER_PUBKEY}#g" src-tauri/tauri.updater.conf.json
          rm src-tauri/tauri.updater.conf.json.bak
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: OpsBatch v${{ needs.check-version.outputs.version }}
          releaseBody: See the assets to download this version.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.updater.conf.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: opsbatch-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare updater config
        run: |
          set -euo pipefail
          test -n "${TAURI_UPDATER_PUBKEY}"
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
          sed -i.bak "s#__TAURI_UPDATER_PUBKEY__#${TAURI_UPDATER_PUBKEY}#g" src-tauri/tauri.updater.conf.json
          rm src-tauri/tauri.updater.conf.json.bak
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: OpsBatch v${{ needs.check-version.outputs.version }}
          releaseBody: See the assets to download this version.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.updater.conf.json

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: opsbatch-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz*

  build-linux:
    name: Build Linux
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare updater config
        run: |
          set -euo pipefail
          test -n "${TAURI_UPDATER_PUBKEY}"
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
          sed -i.bak "s#__TAURI_UPDATER_PUBKEY__#${TAURI_UPDATER_PUBKEY}#g" src-tauri/tauri.updater.conf.json
          rm src-tauri/tauri.updater.conf.json.bak
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: OpsBatch v${{ needs.check-version.outputs.version }}
          releaseBody: See the assets to download this version.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.updater.conf.json

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: opsbatch-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage*
            src-tauri/target/release/bundle/rpm/*.rpm

  publish-release:
    name: Publish release
    needs:
      - check-version
      - build-windows
      - build-macos
      - build-linux
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}'
            const tag = `v${version}`
            const { owner, repo } = context.repo
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            })
            const release = releases.find((item) => item.tag_name === tag)
            if (!release) {
              core.setFailed(`Release ${tag} was not created`)
              return
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              draft: false,
              prerelease: false,
            })
